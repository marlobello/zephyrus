name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Version must be in semver format (e.g. 1.2.0)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version code
        id: version
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          code=$((major * 10000 + minor * 100 + patch))
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "Version ${{ inputs.version }} → versionCode $code"

      - name: Decode keystore
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore
          echo "RELEASE_KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        if: ${{ env.RELEASE_KEYSTORE_FILE != '' }}
        env:
          RELEASE_KEYSTORE_FILE: ${{ env.RELEASE_KEYSTORE_FILE }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PVERSION_NAME=${{ inputs.version }} \
            -PVERSION_CODE=${{ steps.version.outputs.code }}

      - name: Build debug APK (no signing secrets)
        if: ${{ env.RELEASE_KEYSTORE_FILE == '' }}
        run: |
          echo "⚠️ No signing secrets configured — building debug APK"
          ./gradlew assembleDebug \
            -PVERSION_NAME=${{ inputs.version }} \
            -PVERSION_CODE=${{ steps.version.outputs.code }}

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Zephyrus v${{ inputs.version }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore
